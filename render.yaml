services:
  - type: web
    name: backend-api
    env: java
    plan: free
    buildCommand: mvn clean install -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        scope: build,run
      - key: DB_USERNAME
        scope: build,run
      - key: DB_PASSWORD
        scope: build,run
        isPrivate: true
      - key: SPRING_PROFILES_ACTIVE
        value: prod
